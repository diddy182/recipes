<VirtualHost *:80>
    ServerName recipes.jordanherrick.com
    DocumentRoot /var/www/recipes/site

    <Directory /var/www/recipes/site>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/recipes-error.log
    CustomLog ${APACHE_LOG_DIR}/recipes-access.log combined
</VirtualHost>
